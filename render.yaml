# Render Deployment for Clínica Aauca Web Service
services:
  - type: web
    name: clinica-aauca-web
    env: java
    region: frankfurt # Or user's preference
    plan: free # Can be upgraded for persistence
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/clinica-sistema-gestion-1.0-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: 17
    # Use disk for SQLite if plan supports it (Free plan might reset disk)
    disk:
      name: clinica-data
      mountPath: /data
      sizeGB: 1
